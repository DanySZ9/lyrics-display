<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deftones | Lyrics Display</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="mesh">

    <main class="target">
        <img
            class="album-cover"
            src="./images/album.jpg"
            alt="Deftones album cover"
        >
        <ul class="lyrics" aria-label="Song lyrics">
            <li>Riding your wave</li>
            <li>Wrapped in your calm</li>
            <li>And your arms over my head</li>
            <li>In your wave</li>
            <li>Kept me, kept me calm</li>
            <li>With your arms over my head</li>
        </ul>
    </main>

</body>
</html>
